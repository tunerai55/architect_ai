<form method="POST">
    {% csrf_token %}

    <textarea name="prompt" placeholder="Describe your project...
Example: Build a Django ecommerce app with login and cart"
    rows="5" style="width:100%"></textarea>

    <button name="action" value="generate">Generate</button>
    <button name="action" value="download">Download</button>
</form>

{% if result %}
    <h2>Generated Project</h2>
    <pre>{{ result }}</pre>
{% endif %}
