<form method="POST">
    {% csrf_token %}

    <label>Technology:</label>
    <select name="tech">
        <option value="django">Django</option>
        <option value="android">Android</option>
    </select>

    <label>Project Type:</label>
    <select name="type">
        <option value="web">Web App</option>
        <option value="android">Android</option>
    </select>

    <input type="text" name="topic" placeholder="Enter project topic">

    <select name="difficulty">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
    </select>

    <!-- IMPORTANT -->
    <button type="submit" name="action" value="generate">Generate Project</button>
    <button type="submit" name="action" value="download">Download Project</button>

</form>

{% if result %}
    <h2>Generated Project</h2>
    <pre>{{ result }}</pre>
{% endif %}
